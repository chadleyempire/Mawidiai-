<!DOCTYPE html>
<html lang="en">
<head>

    <title>Mawidy AI</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f9ff;

        }

        .header {
            background: #1e88e5;
            color: white;
            padding: 20px;
            font-size: 24px;
        }

        .container {
            margin-top: 40px;
        }

        .btn {
            display: block;
            width: 80%;

            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #1e88e5;
            color: white;
        }

        .btn:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>

    <div class="header">🤖 Mawidy AI</div>

    <div class="container">

        <button class="btn">🎵 Upload Song</button>

        <button class="btn">👤 Login / Register</button>

    </div>

</body>
</html>
